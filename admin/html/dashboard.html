<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="../../assets/images/admin.logo.svg"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../global.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/toast.css" />
    <link rel="stylesheet" href="../css/loading.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
  </head>

  <body>
    <!-- ── Page Loader ── -->
    <div id="page-loader">
      <div class="loader-wrapper">
        <div class="loader-ring-1"></div>
        <div class="loader-ring-2"></div>
        <div class="loader-ring-3"></div>
        <div class="loader-dot"></div>
      </div>
      <p class="loader-label">Loading</p>
      <div class="loader-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="dashBoardContainer">
      <!-- Navbar start -->
      <aside class="asideContainer">
        <div class="upperAside">
          <div class="logoArea">
            <img src="../../assets/images/filmalisalogo.png" alt="" />
            <p class="aside-text">filmalisa</p>
          </div>

          <!-- SIDEBAR -->
          <a href="./dashboard.html" class="sideBar-item dashBoardItem">
            <img src="../../assets/images/dashboard.svg" alt="" />
            <span class="sideBar-text">Dashboard</span>
          </a>

          <a href="./movies.html" class="sideBar-item movieItem">
            <img src="../../assets/images/Group.svg" alt="" />
            <span class="sideBar-text">Movies</span>
          </a>

          <a href="./categories.html" class="sideBar-item categoriesItem">
            <img src="../../assets/images/star.svg" alt="" />
            <span class="sideBar-text">Categories</span>
          </a>

          <a href="./user.html" class="sideBar-item usersItem">
            <img src="../../assets/images/user.svg" alt="" />
            <span class="sideBar-text">Users</span>
          </a>

          <a href="./comment.html" class="sideBar-item commentsItem">
            <img src="../../assets/images/comment.svg" alt="" />
            <span class="sideBar-text">Comments</span>
          </a>

          <a href="./contactUs.html" class="sideBar-item contactItem">
            <img src="../../assets/images/faq.svg" alt="" />
            <span class="sideBar-text">Contact</span>
          </a>
          <a href="./actors.html" class="sideBar-item actorItem">
            <img src="../../assets/images/user.svg" alt="" />
            <span class="sideBar-text">Actors</span>
          </a>
        </div>

        <div class="lowerAside" id="logoutBtn" style="cursor:pointer;">
          <img src="../../assets/images/logout.svg" alt="" />
          <span class="logout-text">Logout</span>
        </div>
      </aside>
      <!-- Navbar end -->

      <!-- MAIN -->
      <main>
        <div class="mainContent">
          <header class="dashBoard-header">
            <div class="leftHeaderSection">
              <p class="admin-text">Hi Admin</p>
              <p class="page-text">Dashboard</p>
            </div>

            <div class="rightHeaderSection">
              <img src="../../assets/images/adminman.svg" alt="" />
              <p class="profileName">Admin</p>
            </div>
          </header>

          <section class="cards-container">
            <div class="favoriteCard statCard-purple" id="favoriteCardBtn" style="cursor:pointer;">
              <p class="dashboard-text">Favorite actions</p>
              <p class="dashboard-number">
                <span id="dashboard-favorite-count"></span>
              </p>
            </div>

            <a href="./user.html" class="statCard statCard-purple">
              <p class="dashboard-text">Users</p>
              <p class="dashboard-number">
                <span id="dashboard-users-count"></span>
              </p>
            </a>

            <a href="./movies.html" class="statCard statCard-purple">
              <p class="dashboard-text">Movies</p>
              <p class="dashboard-number">
                <span id="dashboard-movies-count"></span>
              </p>
            </a>

            <a href="./comment.html" class="statCard statCard-purple">
              <p class="dashboard-text">Comments</p>
              <p class="dashboard-number">
                <span id="dashboard-comments-count"></span>
              </p>
            </a>

            <a href="./categories.html" class="categoriesCard statCard-purple">
              <p class="dashboard-text">Categories</p>
              <p class="dashboard-number">
                <span id="dashboard-categories-count"></span>
              </p>
            </a>

            <a href="./actors.html" class="statCard statCard-purple">
              <p class="dashboard-text">Actors</p>
              <p class="dashboard-number">
                <span id="dashboard-actors-count"></span>
              </p>
            </a>

            <a href="./contactUs.html" class="statCard statCard-purple">
              <p class="dashboard-text">Contacts</p>
              <p class="dashboard-number">
                <span id="dashboard-contacts-count"></span>
              </p>
            </a>
          </section>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Favorites Modal -->
    <dialog id="favoritesModal" class="fav-modal">
      <div class="fav-modal-box">
        <div class="fav-modal-header">
          <h2>Favorite Actions</h2>
          <button type="button" class="fav-close-btn" onclick="favoritesModal.close()">&times;</button>
        </div>
        <div class="fav-modal-body">
          <div class="fav-icon-wrap">
            <i class="fa-solid fa-heart"></i>
          </div>
          <p class="fav-label">Total Favorites</p>
          <p class="fav-count" id="favModalCount">&mdash;</p>
          <p class="fav-desc">Total number of times users have added movies to their favorites list.</p>
        </div>
      </div>
    </dialog>

    <!-- Auth guard: redirect to login if no token -->
    <script src="../js/utils/adminAuthGuard.js"></script>

    <!-- Load dashboard as ES6 module (it will import all dependencies) -->
    <script type="module" src="../js/pages/dashboard/index.js"></script>
  </body>
</html>
