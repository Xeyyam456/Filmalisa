<!doctype html>
<html lang="az">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account</title>
  <link rel="shortcut icon" href="/assets/images/admin.logo.svg" type="image/x-icon" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Shared aside styles -->
  <link rel="stylesheet" href="../css/aside.css" />
  <link rel="stylesheet" href="../css/account.css" />
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../css/toast.css" />
  <link rel="stylesheet" href="../../admin/css/loading.css" />
  <link rel="stylesheet" href="../responsiv/aside.responsive.css" />
  <link rel="stylesheet" href="../responsiv/account.responsive.css" />
</head>

<body>

  <!-- Page Loader -->
  <div id="page-loader">
    <div class="loader-wrapper">
      <div class="loader-ring-1"></div>
      <div class="loader-ring-2"></div>
      <div class="loader-ring-3"></div>
      <div class="loader-dot"></div>
    </div>
    <p class="loader-label">Loading</p>
    <div class="loader-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="page-shell">

    <!-- ============================================================
           ASIDE — Left navigation panel
      ============================================================ -->
    <nav class="menu">
      <a class="menu__item menu__logo" href="./home.html">
        <img src="../../assets/images/icon1..svg" class="image" alt="Logo" />
      </a>

      <div class="menu__nav-group">
        <a class="menu__item" href="./home.html">
          <img src="../../assets/images/home.icon2.svg" alt="Home" />
        </a>

        <a class="menu__item" href="./search-panel.html">
          <img src="../../assets/images/home.icon3.svg" alt="Search" />
        </a>
        <a class="menu__item active" href="./account.html">
          <img src="../../assets/images/account-icon-active.svg" alt="Account" />
        </a>
        <a class="menu__item" href="./favorite.html">
          <img src="../../assets/images/home.icon5.svg" alt="Favorites" />
        </a>


      </div>
    </nav>
    <!-- /ASIDE -->

    <!-- ============================================================
           MAIN CONTENT — User account page
      ============================================================ -->
    <main class="page-main">
      <section class="account-wrap">
        <div class="account-card">
          <div class="profile-avatar" id="avatarWrapper">
            <img id="profilePreview" src="" alt="Profile" />
          </div>

          <input id="profileImageFileInput" type="file" accept="image/*" style="display: none;"
            aria-label="Select profile image from local" />

          <form class="account-form" id="accountForm">
            <div class="form-group">
              <span class="input-icon">
                <i class="fa-regular fa-image"></i>
              </span>
              <input id="profileImageUrlInput" type="text" placeholder="Profile image url" />
            </div>

            <div class="form-group">
              <span class="input-icon">
                <i class="fa-regular fa-user"></i>
              </span>
              <input id="fullNameInput" type="text" placeholder="Full name" />
            </div>

            <div class="form-group">
              <span class="input-icon">
                <img src="../../assets/images/admin.username.svg" alt="email icon" />
              </span>
              <input id="emailInput" type="email" placeholder="Email" disabled />
            </div>

            <div class="form-group">
              <span class="input-icon">
                <img src="../../assets/images/admin.password.svg" alt="password icon" />
              </span>
              <input id="passwordInput" type="password" placeholder="Password" />
              <button class="toggle-eye" id="togglePassword" type="button" aria-label="Toggle password visibility">
                <img src="../../assets/images/password-toggle.svg" alt="toggle password visibility" />
              </button>
            </div>

            <button type="submit" class="save-btn">Save</button>
          </form>
        </div>
      </section>
    </main>
    <!-- /MAIN CONTENT -->

  </div>
  <script type="module" src="../js/pages/account.js"></script>
</body>

</html>
