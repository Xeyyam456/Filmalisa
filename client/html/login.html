<!doctype html>
<html lang="az">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="shortcut icon" href="../../assets/images/admin.logo.svg" type="image/x-icon" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../css/toast.css" />

</head>


<body>

  <!-- login page start -->
  <div class="login-page">

    <!-- login box start -->
    <div class="login-box">

      <!-- logo start -->
      <div class="login-logo">
        <img src="../../assets/images/admin.logo.svg" alt="Logo" />
      </div>
      <!-- logo end -->

     
      <h1 class="brand-title">filmalisa</h1>
      

     
      <h2 class="login-title">login</h2>
      

  

      <!-- login form start -->
      <form class="login-form" id="loginForm">

        <!-- input email start -->
        <div class="form-group">
          <span class="input-icon">
            <img src="../../assets/images/admin.username.svg" alt="email icon" />
          </span>
          <input type="email" id="email" placeholder="email" required />
        </div>
        <!-- input email end -->

        <!-- input password start -->
        <div class="form-group">
          <span class="input-icon">
            <img src="../../assets/images/admin.password.svg" alt="password icon" />
          </span>
          <input type="password" id="password" placeholder="password" required />
          <span class="toggle-eye" id="togglePassword">
            <img id="pass-toggle" src="../../assets/images/password-toggle.svg" alt="toggle password visibility" />
          </span>
        </div>
        <!-- input password end -->

    
        <a href="./register.html" class="helper-link">Register here</a>
       

        <button type="submit" class="login-button">login</button>
      

      </form>
      <!-- login form end -->

    </div>
    <!-- login box end -->

  </div>
  <!-- login page end -->

 
  <script type="module" src="../js/pages/login.js"></script>


</body>

</html>
