<!doctype html>
<html lang="az">


<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="shortcut icon" href="../../assets/images/admin.logo.svg" type="image/x-icon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Numans&family=Poppins:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/register.css" />
  <link rel="stylesheet" href="../../global.css" />
  <link rel="stylesheet" href="../css/toast.css" />

</head>


<body>

  <!-- register page start -->
  <div class="register-page">

    <!-- register box start -->
    <div class="register-box">

      <!-- logo start -->
      <div class="register-logo">
        <img src="../../assets/images/admin.logo.svg" alt="Logo" />
      </div>
      <!-- logo end -->

    
      <h1 class="brand-title">filmalisa</h1>
   

     
      <h2 class="register-title">register</h2>
   

      <!-- register form start -->
      <form class="register-form" id="registerForm">

        <!-- input fullname start -->
        <div class="form-group">
          <span class="input-icon">
            <i class="fa-regular fa-user"></i>
          </span>
          <input id="fullname" type="text" placeholder="full name" required />
        </div>
        <!-- input fullname end -->

        <!-- input email start -->
        <div class="form-group">
          <span class="input-icon">
            <img src="../../assets/images/admin.username.svg" alt="email icon" />
          </span>
          <input id="email" type="email" placeholder=" email" name="gmail" required />
        </div>
        <!-- input email end -->

        <!-- input password start -->
        <div class="form-group">
          <span class="input-icon">
            <img src="../../assets/images/admin.password.svg" alt="password icon" />
          </span>
          <input type="password" id="password" placeholder=" password" required />
          <span class="toggle-eye" id="togglePassword">
            <img id="pass-toggle" src="../../assets/images/password-toggle.svg" alt="toggle password visibility" />
          </span>
        </div>
        <!-- input password end -->

       
        <a href="./login.html" class="helper-link">Do you have an account? Login here</a>
    

       
        <button type="submit" class="register-button">register</button>
     

      </form>
      <!-- register form end -->

    </div>
    <!-- register box end -->

  </div>
  <!-- register page end -->

  <script type="module" src="../js/pages/register.js"></script>
  

</body>

</html>
